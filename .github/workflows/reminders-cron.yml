name: Session reminders (every 30 min)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

jobs:
  ping-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminders endpoint
        run: |
          curl -sS -X GET "https://aarem.net/api/cron/reminders" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            --fail-with-body
