<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 385">
  <!-- Ground shadow -->
  <ellipse cx="120" cy="376" rx="58" ry="9" fill="rgba(0,0,0,0.07)"/>

  <!-- LEGS -->
  <rect x="74"  y="260" width="36" height="76" rx="18" fill="#1A3A6B"/>
  <rect x="130" y="260" width="36" height="76" rx="18" fill="#1A3A6B"/>

  <!-- SHOES -->
  <ellipse cx="92"  cy="336" rx="26" ry="10" fill="#1a1a1a"/>
  <ellipse cx="148" cy="336" rx="26" ry="10" fill="#1a1a1a"/>
  <!-- Shoe highlights -->
  <ellipse cx="88"  cy="330" rx="14" ry="4"  fill="rgba(255,255,255,0.12)"/>
  <ellipse cx="144" cy="330" rx="14" ry="4"  fill="rgba(255,255,255,0.12)"/>

  <!-- BODY (shirt) -->
  <path d="M55 192 Q51 180 57 167 L80 149 Q96 165 120 167 Q144 165 160 149 L183 167 Q189 180 185 192 L179 268 H61 Z" fill="#2980B9"/>
  <!-- Shirt shading -->
  <path d="M61 268 L179 268 L182 245 Q120 260 58 245 Z" fill="rgba(0,0,0,0.08)"/>

  <!-- LEFT ARM (relaxed, slightly forward) -->
  <path d="M57 195 Q30 224 24 260" stroke="#2980B9" stroke-width="32" fill="none" stroke-linecap="round"/>
  <!-- Left hand -->
  <circle cx="25" cy="260" r="16" fill="#F5C9A0"/>

  <!-- RIGHT ARM (raised, waving!) -->
  <path d="M183 195 Q208 168 213 132" stroke="#2980B9" stroke-width="32" fill="none" stroke-linecap="round"/>
  <!-- Waving hand palm -->
  <circle cx="214" cy="125" r="17" fill="#F5C9A0"/>
  <!-- Fingers spread -->
  <ellipse cx="205" cy="109" rx="7" ry="11" fill="#F5C9A0"/>
  <ellipse cx="215" cy="106" rx="7" ry="11" fill="#F5C9A0"/>
  <ellipse cx="225" cy="111" rx="7" ry="11" fill="#F5C9A0"/>
  <ellipse cx="228" cy="122" rx="7" ry="10" fill="#F5C9A0"/>
  <!-- Finger lines -->
  <line x1="205" y1="118" x2="205" y2="110" stroke="#E8A87C" stroke-width="1.5" opacity="0.5"/>
  <line x1="215" y1="117" x2="215" y2="107" stroke="#E8A87C" stroke-width="1.5" opacity="0.5"/>
  <line x1="225" y1="120" x2="225" y2="112" stroke="#E8A87C" stroke-width="1.5" opacity="0.5"/>

  <!-- NECK -->
  <rect x="104" y="162" width="32" height="28" rx="8" fill="#F5C9A0"/>

  <!-- V-COLLAR -->
  <path d="M100 167 L120 185 L140 167 L120 174 Z" fill="#1d6aa0"/>

  <!-- SHIRT DECORATION (star badge) -->
  <path d="M120 210 L123 220 L134 220 L126 227 L129 238 L120 231 L111 238 L114 227 L106 220 L117 220 Z"
        fill="rgba(255,255,255,0.30)"/>

  <!-- HEAD -->
  <circle cx="120" cy="104" r="72" fill="#F5C9A0"/>
  <!-- Head subtle shading (right cheek area lighter) -->
  <circle cx="138" cy="90" r="52" fill="rgba(255,255,255,0.06)"/>

  <!-- EARS (drawn before hair so hair covers their tops) -->
  <ellipse cx="48"  cy="108" rx="13" ry="16" fill="#F5C9A0"/>
  <ellipse cx="48"  cy="112" rx="8"  ry="10" fill="#E8A87C" opacity="0.45"/>
  <ellipse cx="192" cy="108" rx="13" ry="16" fill="#F5C9A0"/>
  <ellipse cx="192" cy="112" rx="8"  ry="10" fill="#E8A87C" opacity="0.45"/>

  <!-- HAIR CAP (covers top of head + ear tops) -->
  <path d="M48 92 Q52 26 120 24 Q188 26 192 92
           Q175 48 154 37 Q136 28 120 27 Q104 28 86 37 Q65 48 48 92 Z"
        fill="#1C0A00"/>
  <!-- Hair sideburns covering ear tops -->
  <path d="M48 92 Q43 110 47 128 Q51 112 60 97 Z" fill="#1C0A00"/>
  <path d="M192 92 Q197 110 193 128 Q189 112 180 97 Z" fill="#1C0A00"/>
  <!-- Hair highlight shine -->
  <path d="M88 36 Q120 27 152 36 Q136 30 120 29 Q104 30 88 36 Z"
        fill="rgba(255,255,255,0.08)"/>

  <!-- EYEBROWS (arched happily) -->
  <path d="M76 78 Q92 68 108 76" stroke="#1C0A00" stroke-width="4.5" stroke-linecap="round" fill="none"/>
  <path d="M132 76 Q148 68 164 78" stroke="#1C0A00" stroke-width="4.5" stroke-linecap="round" fill="none"/>

  <!-- EYE WHITES -->
  <ellipse cx="92"  cy="96" rx="18" ry="17" fill="white"/>
  <ellipse cx="148" cy="96" rx="18" ry="17" fill="white"/>

  <!-- IRISES (warm brown) -->
  <circle cx="93"  cy="98" r="11" fill="#6B3E20"/>
  <circle cx="149" cy="98" r="11" fill="#6B3E20"/>

  <!-- PUPILS -->
  <circle cx="93"  cy="98" r="6.5" fill="#0d0600"/>
  <circle cx="149" cy="98" r="6.5" fill="#0d0600"/>

  <!-- EYE HIGHLIGHTS (two-dot style) -->
  <circle cx="97"  cy="94" r="3.2" fill="white"/>
  <circle cx="153" cy="94" r="3.2" fill="white"/>
  <circle cx="89"  cy="103" r="1.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="145" cy="103" r="1.5" fill="rgba(255,255,255,0.4)"/>

  <!-- NOSE (soft, minimal) -->
  <path d="M113 124 Q120 135 127 124"
        stroke="#C98B5E" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- OPEN SMILE -->
  <path d="M82 142 Q120 180 158 142" fill="#8B2010"/>
  <!-- Teeth -->
  <path d="M86 143 Q120 176 154 143 Q120 162 86 143 Z" fill="white"/>
  <!-- Tongue hint -->
  <ellipse cx="120" cy="165" rx="14" ry="7" fill="#D4534A" opacity="0.7"/>

  <!-- CHEEK BLUSH -->
  <ellipse cx="68"  cy="122" rx="18" ry="11" fill="#FF6B6B" opacity="0.22"/>
  <ellipse cx="172" cy="122" rx="18" ry="11" fill="#FF6B6B" opacity="0.22"/>
</svg>
