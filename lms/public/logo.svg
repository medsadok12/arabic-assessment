<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7e4a8"/>
      <stop offset="35%" stop-color="#d4952a"/>
      <stop offset="70%" stop-color="#b8760e"/>
      <stop offset="100%" stop-color="#f5d68a"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1f1266"/>
      <stop offset="100%" stop-color="#0a0528"/>
    </linearGradient>
    <radialGradient id="innerGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#2d1b69" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0a0528" stop-opacity="0"/>
    </radialGradient>
    <filter id="goldShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#d4952a" flood-opacity="0.5"/>
    </filter>
    <filter id="subtleGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feFlood flood-color="#d4952a" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <circle cx="100" cy="100" r="98" fill="url(#bgGrad)"/>
  <circle cx="100" cy="100" r="98" fill="url(#innerGlow)"/>

  <circle cx="100" cy="100" r="92" fill="none" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.35"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="url(#goldGrad)" stroke-width="0.5" opacity="0.2"/>
  <circle cx="100" cy="100" r="96" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.8"/>

  <g filter="url(#subtleGlow)">
    <text x="100" y="125" text-anchor="middle" fill="url(#goldGrad)"
          font-size="110" font-family="'Noto Naskh Arabic','Traditional Arabic','Scheherazade','serif'"
          font-weight="bold">ع</text>
  </g>

  <line x1="55" y1="155" x2="145" y2="155" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4" stroke-linecap="round"/>
  <circle cx="100" cy="155" r="2" fill="url(#goldGrad)" opacity="0.5"/>
  <circle cx="88" cy="155" r="1.2" fill="url(#goldGrad)" opacity="0.3"/>
  <circle cx="112" cy="155" r="1.2" fill="url(#goldGrad)" opacity="0.3"/>

  <g opacity="0.15" fill="url(#goldGrad)">
    <circle cx="38" cy="38" r="1"/>
    <circle cx="162" cy="38" r="1"/>
    <circle cx="30" cy="100" r="0.8"/>
    <circle cx="170" cy="100" r="0.8"/>
    <circle cx="38" cy="162" r="1"/>
    <circle cx="162" cy="162" r="1"/>
  </g>
</svg>
